services:
  mysql:
    image: mysql:8.0
    container_name: yinyue-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${APP_DB_NAME:-yinyue_db}
      MYSQL_USER: ${APP_DB_USERNAME:-yinyue}
      MYSQL_PASSWORD: ${APP_DB_PASSWORD:-yinyue}
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: yinyue-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: yinyue-backend
    ports:
      - "${BACKEND_PORT:-8081}:8081"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      APP_SERVER_PORT: 8081
      APP_DB_URL: jdbc:mysql://mysql:3306/${APP_DB_NAME:-yinyue_db}?useSSL=false&serverTimezone=UTC&characterEncoding=utf8&allowPublicKeyRetrieval=true&allowLoadLocalInfile=false&createDatabaseIfNotExist=true
      APP_DB_USERNAME: ${APP_DB_USERNAME:-yinyue}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:-yinyue}
      APP_REDIS_HOST: redis
      APP_REDIS_PORT: 6379
      APP_STORAGE_LOCAL_PATH: /app/runtime/uploads
      APP_PYTHON_COMMAND: /opt/audio-venv/bin/python
      APP_NETEASE_SCRIPT_PATH: /app/netease_parser.py
      APP_ANALYSIS_PYTHON_COMMAND: /opt/audio-venv/bin/python
      APP_ANALYSIS_SCRIPT_PATH: /app/scripts/analyze_audio.py
      APP_ANALYSIS_PROVIDER: ${APP_ANALYSIS_PROVIDER:-essentia}
      APP_ANALYSIS_TIMEOUT_SECONDS: ${APP_ANALYSIS_TIMEOUT_SECONDS:-120}
      APP_SEMANTIC_PYTHON_COMMAND: /opt/audio-venv/bin/python
      APP_SEMANTIC_SCRIPT_PATH: /app/scripts/extract_music_semantics.py
      APP_SEMANTIC_TIMEOUT_SECONDS: ${APP_SEMANTIC_TIMEOUT_SECONDS:-300}
      APP_SEPARATION_PYTHON_COMMAND: /opt/audio-venv/bin/python
      APP_SEPARATION_SCRIPT_PATH: /app/scripts/separate_audio.py
      APP_SEPARATION_OUTPUT_ROOT: /app/runtime/separated
      APP_SEPARATION_TIMEOUT_SECONDS: ${APP_SEPARATION_TIMEOUT_SECONDS:-300}
      APP_SECURITY_ENABLED: ${APP_SECURITY_ENABLED:-true}
      APP_RATE_LIMIT_ENABLED: ${APP_RATE_LIMIT_ENABLED:-true}
      APP_RATE_LIMIT_PER_MINUTE: ${APP_RATE_LIMIT_PER_MINUTE:-60}
      APP_API_TOKEN: ${APP_API_TOKEN:-}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      APP_QWEN_API_KEY: ${APP_QWEN_API_KEY:-}
      APP_AUDD_API_KEY: ${APP_AUDD_API_KEY:-}
      APP_SD_ENDPOINT: ${APP_SD_ENDPOINT:-http://host.docker.internal:7860}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backend_runtime:/app/runtime

volumes:
  mysql_data:
  redis_data:
  backend_runtime:
