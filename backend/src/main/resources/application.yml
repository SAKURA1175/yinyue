spring:
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:../.env[.properties]
  profiles:
    default: dev
  application:
    name: yinyue-backend # 项目的名字，就像是给孩子起名字叫“yinyue-backend”
  
  # ========================================================================
  # Spring AI 配置 (人工智能大脑)
  # ========================================================================
  ai:
    openai:
      api-key: ${APP_LLM_API_KEY:${APP_QWEN_API_KEY:}} # OpenAI 兼容协议 API Key（兼容旧 QWEN 变量）
      base-url: ${APP_LLM_BASE_URL:${APP_QWEN_BASE_URL:https://api.openai.com}} # OpenAI 兼容协议 Base URL
      chat:
        base-url: ${APP_LLM_BASE_URL:${APP_QWEN_BASE_URL:https://api.openai.com}} # 显式指定 Chat 的 Base URL
        options:
          model: ${APP_LLM_MODEL:${APP_QWEN_LLM_MODEL:qwen-long}} # 默认使用的模型名字
          temperature: 0.7 # 创意程度（0=严格，1=创意）

  # ========================================================================
  # MySQL 数据库配置 (数据仓库)
  # ========================================================================
  datasource:
    # 数据库的地址。
    # jdbc:mysql://localhost:3306/yinyue_db: 意思是连接本机 3306 端口上叫 yinyue_db 的数据库。
    # useSSL=false: 不使用加密连接（开发环境用，省事）。
    # serverTimezone=UTC: 使用世界标准时间。
    # characterEncoding=utf8: 使用 UTF-8 编码，防止中文乱码。
    url: ${APP_DB_URL:jdbc:mysql://localhost:3306/yinyue_db?useSSL=false&serverTimezone=UTC&characterEncoding=utf8&allowPublicKeyRetrieval=true&allowLoadLocalInfile=false&createDatabaseIfNotExist=true}
    username: ${APP_DB_USERNAME:root} # 数据库管理员账号
    password: ${APP_DB_PASSWORD:} # 数据库管理员密码
    driver-class-name: com.mysql.cj.jdbc.Driver # 使用的“司机”（驱动程序），用来开动 MySQL。
    
    # 连接池配置 (HikariCP)
    # 就像是出租车公司，不用每次有人打车都现买一辆车，而是预先准备好几辆车（连接）等着。
    hikari:
      maximum-pool-size: 10 # 最多同时有 10 辆车接客。
      minimum-idle: 5       # 至少保留 5 辆空车等着，随叫随到。
  
  # ========================================================================
  # JPA 配置 (数据库管家)
  # ========================================================================
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false # 是否在控制台打印 SQL 语句（太啰嗦了，关掉）。
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect # 告诉管家我们用的是 MySQL 方言。
        format_sql: true # 如果打印 SQL，就格式化一下，哪怕是程序员也要看整齐的代码。
  flyway:
    enabled: true
    locations: classpath:db/migration
  
  # ========================================================================
  # Redis 配置 (高速缓存)
  # ========================================================================
  redis:
    host: ${APP_REDIS_HOST:localhost} # Redis 住在哪里（本机）。
    port: ${APP_REDIS_PORT:6379}      # Redis 的门牌号。
    database: ${APP_REDIS_DATABASE:0}     # Redis 默认有 16 个房间，我们用第 0 号房间。
    timeout: ${APP_REDIS_TIMEOUT_MS:2000}   # 超时时间 2 秒。
    jedis:
      pool:
        max-active: 20 # 最多 20 个连接。
        max-idle: 10   # 最多 10 个空闲。
        min-idle: 5    # 最少 5 个空闲。
  
  # ========================================================================
  # 文件上传配置
  # ========================================================================
  servlet:
    multipart:
      max-file-size: 100MB    # 单个文件最大 100MB。
      max-request-size: 100MB # 整个请求最大 100MB。

# ========================================================================
# 服务器配置
# ========================================================================
server:
  port: ${APP_SERVER_PORT:8081} # 我们的程序运行在 8081 端口。
  servlet:
    context-path: /api # 所有接口的前缀。比如访问 /upload 实际上是 /api/upload。

# ========================================================================
# 日志配置
# ========================================================================
logging:
  level:
    root: INFO # 默认只打印重要的信息。
    com.yinyue: DEBUG # 但是对于我们自己写的代码 (com.yinyue)，要打印得详细一点 (DEBUG)，方便找 bug。
    org.springframework.ai: DEBUG
    org.springframework.web.client: DEBUG
    org.apache.http: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n" # 日志打印的格式：日期 \u65f6\u95f4 - \u6d88\u606f \u6362\u884c。

# ========================================================================
# Actuator 配置 (健康检查、暴露端点)
# ========================================================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus # 暴露端点，便于监控
  endpoint:
    health:
      show-details: always # 总是显示详细的健康检查
  metrics:
    export:
      simple:
        enabled: true

# ========================================================================
# 自定义应用配置 (我们自己定义的变量)
# ========================================================================
app:
  # AI 服务配置
  ai:
    llm:
      api-key: ${APP_LLM_API_KEY:${APP_QWEN_API_KEY:}}
      base-url: ${APP_LLM_BASE_URL:${APP_QWEN_BASE_URL:https://api.openai.com}}
      model: ${APP_LLM_MODEL:${APP_QWEN_LLM_MODEL:qwen-long}}
      default-model: ${APP_LLM_DEFAULT_MODEL:${APP_QWEN_OPENAI_DEFAULT_MODEL:gpt-5.4-mini}}
      mock-on-error: ${APP_LLM_MOCK_ON_ERROR:true}
    # 阿里通义千问配置 (负责分析歌词)
    qwen:
      api-key: ${APP_QWEN_API_KEY:} # 阿里云的通行证
      model-asr: ${APP_QWEN_ASR_MODEL:qwen3-asr-flash} # 语音识别模型
      model-llm: ${APP_QWEN_LLM_MODEL:qwen-long}       # 文本生成模型
      openai-default-model: ${APP_QWEN_OPENAI_DEFAULT_MODEL:gpt-5.4-mini}
      asr-endpoint: ${APP_QWEN_ASR_ENDPOINT:https://dashscope.aliyuncs.com/api/v1/services/audio/asr/transcriptions}
      endpoint: ${APP_QWEN_TEXT_ENDPOINT:https://dashscope.aliyuncs.com/api/v1/services/aigc/text-generation/generation}
      # AI 服务超时和重试配置
      timeout: 30000 # 30秒超时
      max-retries: 3 # 最多重试3次
    
    # Audd API 配置 (负责听歌识曲)
    audd:
      api-key: ${APP_AUDD_API_KEY:} # Audd 的通行证
      endpoint: ${APP_AUDD_ENDPOINT:https://api.audd.io/}
      timeout: 30000
      max-retries: 2
    
    # Stable Diffusion WebUI 配置 (负责画图)
    stable-diffusion:
      endpoint: ${APP_SD_ENDPOINT:http://127.0.0.1:7860} # 本地 SD 的地址
      enabled: true
  
  # 文件存储配置
  storage:
    type: local # 存储类型：local (本地硬盘), oss (阿里云对象存储), cos (腾讯云)
    local-path: ${APP_STORAGE_LOCAL_PATH:./runtime/uploads} # 如果是本地存储，存在哪里
    # OSS 配置（预留，以后如果有钱上云了可以用）
    oss:
      endpoint: https://oss-cn-beijing.aliyuncs.com
      access-key-id: your_access_key
      access-key-secret: your_secret_key
      bucket-name: yinyue-music
  import:
    python-command: ${APP_PYTHON_COMMAND:python}
    netease-script-path: ${APP_NETEASE_SCRIPT_PATH:./netease_parser.py}
    netease-timeout-seconds: ${APP_NETEASE_TIMEOUT_SECONDS:15}
  analysis:
    python-command: ${APP_ANALYSIS_PYTHON_COMMAND:.venv-audio/Scripts/python.exe}
    script-path: ${APP_ANALYSIS_SCRIPT_PATH:./scripts/analyze_audio.py}
    provider: ${APP_ANALYSIS_PROVIDER:auto}
    timeout-seconds: ${APP_ANALYSIS_TIMEOUT_SECONDS:60}
  separation:
    python-command: ${APP_SEPARATION_PYTHON_COMMAND:${APP_ANALYSIS_PYTHON_COMMAND:.venv-audio/Scripts/python.exe}}
    script-path: ${APP_SEPARATION_SCRIPT_PATH:./scripts/separate_audio.py}
    output-root: ${APP_SEPARATION_OUTPUT_ROOT:./runtime/separated}
    timeout-seconds: ${APP_SEPARATION_TIMEOUT_SECONDS:180}
    model: ${APP_SEPARATION_MODEL:htdemucs}
    device: ${APP_SEPARATION_DEVICE:auto}
  semantic:
    python-command: ${APP_SEMANTIC_PYTHON_COMMAND:${APP_ANALYSIS_PYTHON_COMMAND:.venv-audio/Scripts/python.exe}}
    script-path: ${APP_SEMANTIC_SCRIPT_PATH:./scripts/extract_music_semantics.py}
    timeout-seconds: ${APP_SEMANTIC_TIMEOUT_SECONDS:180}
    model-id: ${APP_SEMANTIC_MODEL_ID:m-a-p/MERT-v1-95M}
    device: ${APP_SEMANTIC_DEVICE:auto}
    max-seconds: ${APP_SEMANTIC_MAX_SECONDS:30}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://127.0.0.1:5173,http://127.0.0.1:5174}
  security:
    enabled: ${APP_SECURITY_ENABLED:false}
    api-token: ${APP_API_TOKEN:}
    rate-limit-enabled: ${APP_RATE_LIMIT_ENABLED:false}
    rate-limit-per-minute: ${APP_RATE_LIMIT_PER_MINUTE:60}
